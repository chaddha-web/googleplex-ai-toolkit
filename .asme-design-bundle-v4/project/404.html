  })();

/* ---------- Background video with graceful fallback ---------- */
function BgVideo({ src }) {
  const vidRef = useRef(null);
  const [failed, setFailed] = useState(false);
  useEffect(() => {
    const v = vidRef.current;
    if (!v) return;
    const onError = () => setFailed(true);
    v.addEventListener('error', onError);
    const tm = setTimeout(() => { if (v.readyState < 2) setFailed(true); }, 4500);
    return () => { v.removeEventListener('error', onError); clearTimeout(tm); };
  }, [src]);
  return (
    <>
      {failed && <div className="fixed inset-0 w-full h-full placeholder-video z-[0]" />}
      <video
        ref={vidRef}
        src={src}
        muted
        autoPlay
        loop
        playsInline
        preload="auto"
        className={`fixed inset-0 w-full h-full object-cover z-[0] ${failed ? 'hidden' : ''}`}
      />
    </>
  );
}
