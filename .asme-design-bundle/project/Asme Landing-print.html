  // Suppress a benign React dev-mode "key prop" warning emitted from inside
  // framer-motion's internals (not from any of our components). It's a known
  // false positive when motion components are rendered with React 18 dev build.
  (function(){
    const origError = console.error;
    console.error = function(...args){
      const msg = args[0];
      if (typeof msg === 'string' && msg.indexOf('unique "key" prop') !== -1) return;
      return origError.apply(console, args);
    };
  })();
</script>

/* ---------- Video with crossfade-to-black loop & graceful placeholder ---------- */
function FadeLoopVideo({ src, placeholderClass = 'placeholder-video', className = '', objectPos = 'object-bottom' }) {
  const vidRef = useRef(null);
  const rafRef = useRef(null);
  const [failed, setFailed] = useState(false);

  const animateOpacity = (from, to, dur, onDone) => {
    cancelAnimationFrame(rafRef.current);
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / dur);
      const v = from + (to - from) * t;
      if (vidRef.current) vidRef.current.style.opacity = v;
      if (t < 1) rafRef.current = requestAnimationFrame(tick);else
      if (onDone) onDone();
    };
    rafRef.current = requestAnimationFrame(tick);
  };

  useEffect(() => {
    const v = vidRef.current;
    if (!v) return;
    v.style.opacity = 0;
    const onCanPlay = () => {
      v.play().catch(() => {});
      animateOpacity(0, 1, 500);
    };
    const onTimeUpdate = () => {
      if (!v.duration) return;
      const remaining = v.duration - v.currentTime;
      if (remaining <= 0.55 && remaining > 0) {
        const cur = parseFloat(v.style.opacity || '1');
        if (cur > 0.05) animateOpacity(cur, 0, 500);
      }
    };
    const onEnded = () => {
      v.style.opacity = 0;
      setTimeout(() => {
        v.currentTime = 0;
        v.play().catch(() => {});
        animateOpacity(0, 1, 500);
      }, 100);
    };
    const onError = () => setFailed(true);
    v.addEventListener('canplay', onCanPlay);
    v.addEventListener('timeupdate', onTimeUpdate);
    v.addEventListener('ended', onEnded);
    v.addEventListener('error', onError);
    // failure fallback if it never loads
    const tm = setTimeout(() => {if (v.readyState < 2) setFailed(true);}, 4500);
    return () => {
      cancelAnimationFrame(rafRef.current);
      clearTimeout(tm);
      v.removeEventListener('canplay', onCanPlay);
      v.removeEventListener('timeupdate', onTimeUpdate);
      v.removeEventListener('ended', onEnded);
      v.removeEventListener('error', onError);
    };
  }, [src]);

  return (
    <>
      {failed && <div className={`${placeholderClass} absolute inset-0 ${className}`} />}
      <video
        ref={vidRef}
        src={src}
        muted
        autoPlay
        playsInline
        preload="auto"
        className={`${className} ${failed ? 'hidden' : ''}`}
        style={{ opacity: 0 }} />
      
    </>);

}

/* For simple looping videos (no crossfade) */
function LoopVideo({ src, placeholderClass = 'placeholder-video', className = '' }) {
  const vidRef = useRef(null);
  const [failed, setFailed] = useState(false);
  useEffect(() => {
    const v = vidRef.current;
    if (!v) return;
    const tryPlay = () => {v.play().catch(() => {});};
    const onError = () => setFailed(true);
    v.addEventListener('error', onError);
    v.addEventListener('canplay', tryPlay);
    v.addEventListener('loadeddata', tryPlay);
    tryPlay();
    const tm = setTimeout(() => {if (v.readyState < 2) setFailed(true);}, 4500);
    return () => {
      v.removeEventListener('error', onError);
      v.removeEventListener('canplay', tryPlay);
      v.removeEventListener('loadeddata', tryPlay);
      clearTimeout(tm);
    };
  }, [src]);
  return (
    <>
      {failed && <div className={`${placeholderClass} absolute inset-0 ${className}`} />}
      <video ref={vidRef} src={src} muted autoPlay loop playsInline preload="auto"
      className={`${className} ${failed ? 'hidden' : ''}`} />
    </>);

}

  {
    q: 'What do you need from us to start?',
    a: 'A signed SOW, a single point of contact, and access to whatever past research, brand assets, or analytics already exist. We’ll handle the rest of the onboarding — calendar holds, tool invites, kick-off agenda — in the first 48 hours.'
  }];

  const ACCENT = '#1e3a8a'; // deep blue, like the reference

  const prev = () => setActive((a) => (a - 1 + faqs.length) % faqs.length);
  const next = () => setActive((a) => (a + 1) % faqs.length);

  const ArrowL = (p) =>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M19 12H5" /><path d="m11 19-7-7 7-7" />
    </svg>;

  const ArrowR = (p) =>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M5 12h14" /><path d="m13 5 7 7-7 7" />
    </svg>;


  return (
    <section
      className="py-16 md:py-20 px-6 md:px-10 overflow-hidden"
      style={{
        background:
        'radial-gradient(ellipse 60% 50% at 20% 20%, #f4f6fa 0%, transparent 70%),' +
        'radial-gradient(ellipse 70% 50% at 90% 80%, #e9eef6 0%, transparent 70%),' +
        'linear-gradient(180deg, #f0f3f8 0%, #e7ecf3 100%)'
      }}>
      
      <div className="max-w-7xl mx-auto">
        {/* Header row */}
        <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-8 md:gap-16 mb-10 md:mb-12">
          <motion.h2
            initial={{ opacity: 0, y: 20 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.8, ease: 'easeOut' }}
            className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl tracking-tight leading-[1.02] text-neutral-900"
            style={{ fontFamily: '"Helvetica Regular", Inter, sans-serif', fontWeight: 600 }}>
            
            Frequently<br />
            Asked <span style={{ color: ACCENT }}>Questions</span>
          </motion.h2>

          <motion.div
            initial={{ opacity: 0, y: 20 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: 0.8, delay: 0.1, ease: 'easeOut' }}
            className="md:max-w-xs">
            
            <p className="text-neutral-700 text-sm leading-relaxed mb-6">
              Find answers to common questions about how we work, scope projects, and partner with in-house teams.
            </p>
            <div className="flex items-center gap-3">
              <button
                onClick={prev}
                aria-label="Previous question"
                className="w-11 h-11 rounded-full border border-neutral-400 text-neutral-700 flex items-center justify-center hover:bg-neutral-200/60 transition-colors">
                
                <ArrowL />
              </button>
              <button
                onClick={next}
                aria-label="Next question"
                className="w-11 h-11 rounded-full bg-neutral-900 text-white flex items-center justify-center hover:bg-neutral-800 transition-colors">
                
                <ArrowR />
              </button>
            </div>
          </motion.div>
        </div>

        {/* Carousel track */}
        <div className="relative">
          <motion.div
            className="flex"
            style={{ gap: `${GAP}px` }}
            animate={{
              x: -active * (CARD_W_INACTIVE + GAP)
            }}
            transition={{ duration: 0.6, ease: [0.32, 0.72, 0, 1] }}>
            
            {faqs.map((f, i) => {
              const isActive = i === active;
              return (
                <motion.button
                  key={i}
                  onClick={() => setActive(i)}
                  whileHover={!isActive ? { y: -4 } : undefined}
                  className="shrink-0 text-left rounded-3xl p-6 sm:p-8 md:p-10 flex flex-col overflow-hidden"
                  initial={false}
                  animate={{ width: isActive ? CARD_W_ACTIVE : CARD_W_INACTIVE }}
                  transition={{ duration: 0.55, ease: [0.32, 0.72, 0, 1] }}
                  style={{
                    height: `${CARD_H}px`,
                    background: isActive ? ACCENT : 'rgba(255,255,255,0.55)',
                    color: isActive ? '#fff' : '#cbd2dc',
                    boxShadow: isActive ?
                    '0 24px 60px -20px rgba(30,58,138,0.55)' :
                    '0 8px 24px -16px rgba(20,30,55,0.18)',
                    backdropFilter: isActive ? 'none' : 'blur(8px)',
                    WebkitBackdropFilter: isActive ? 'none' : 'blur(8px)',
                    border: isActive ? 'none' : '1px solid rgba(255,255,255,0.6)',
                    cursor: isActive ? 'default' : 'pointer',
                    transition: 'background 0.4s ease, color 0.4s ease, box-shadow 0.4s ease'
                  }}>
                  
                  <h3
                    className="text-2xl md:text-[28px] leading-[1.15] tracking-tight"
                    style={{
                      fontFamily: '"Helvetica Regular", Inter, sans-serif',
                      fontWeight: 500,
                      color: isActive ? '#fff' : '#9ba3b0'
                    }}>
                    
                    {f.q}
                  </h3>

                  {/* Spacer */}
                  <div className="flex-1" />

                  {/* Answer body — only when active */}
                  <motion.p
                    initial={false}
                    animate={{ opacity: isActive ? 1 : 0, y: isActive ? 0 : 8 }}
                    transition={{ duration: 0.4, ease: 'easeOut' }}
                    className="text-sm leading-relaxed mt-6"
                    style={{ color: 'rgba(255,255,255,0.85)', minHeight: '6rem' }}>
                    
                    {isActive ? f.a : ''}
                  </motion.p>
                </motion.button>);

            })}
          </motion.div>
        </div>

        {/* Progress dots */}
        <div className="flex justify-center gap-2 mt-10">
          {faqs.map((_, i) =>
          <button
            key={i}
            onClick={() => setActive(i)}
            aria-label={`Go to question ${i + 1}`}
            className="h-1.5 rounded-full transition-all duration-300"
            style={{
              width: i === active ? 28 : 8,
              background: i === active ? ACCENT : 'rgba(30,58,138,0.25)'
            }} />

          )}
        </div>
      </div>
    </section>);

}
